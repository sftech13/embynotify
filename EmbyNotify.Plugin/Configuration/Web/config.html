<div is="emby-scroller"
     class="view flex flex-direction-column scrollFrameY flex-grow"
     data-horizontal="false"
     data-forcescrollbar="true"
     data-centerfocus="true"
     data-bindheader="true"
     data-controller="__plugin/embynotifyconfig"
     data-title="EmbyNotify">

  <div class="scrollSlider flex-grow flex-direction-column padded-left padded-left-page padded-right padded-top-page padded-bottom-page">

    <h2 class="sectionTitle" style="margin-bottom:.4em;">Broadcast Message</h2>
    <p style="color:var(--text-color-secondary,#aaa);margin:0 0 1.5em;">
      Send a popup message to all users currently active in Emby.
    </p>

    <div style="margin-bottom:1.2em;">
      <label style="display:block;margin-bottom:.4em;font-size:.9em;opacity:.8;">Header</label>
      <input class="txtHeader" type="text" value="Announcement" maxlength="80"
             style="width:100%;box-sizing:border-box;padding:.5em;font-size:1em;" />
    </div>

    <div style="margin-bottom:1.2em;">
      <label style="display:block;margin-bottom:.4em;font-size:.9em;opacity:.8;">Message</label>
      <textarea class="txtMessage" rows="4" placeholder="Type your message here..."
                style="width:100%;box-sizing:border-box;padding:.5em;font-size:1em;resize:vertical;"></textarea>
    </div>

    <div style="margin-bottom:1.5em;">
      <label style="display:block;margin-bottom:.4em;font-size:.9em;opacity:.8;">Auto-dismiss (seconds) &mdash; 0 = stays until dismissed</label>
      <input class="txtTimeout" type="number" value="0" min="0" max="300"
             style="width:120px;padding:.5em;font-size:1em;" />
    </div>

    <button class="btnSend raised button-submit" type="button"
            style="padding:.65em 1.6em;font-size:1em;cursor:pointer;">
      Send to All Sessions
    </button>

    <div class="notifyStatus"
         style="margin-top:1em;padding:.75em 1em;border-radius:4px;display:none;"></div>

  </div>
</div>
